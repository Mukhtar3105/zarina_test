<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Тест — Работы на высоте</title>

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:linear-gradient(180deg,#f5fbff,#ffffff);
color:#1e2b34;
}

.container{
max-width:900px;
margin:auto;
padding:40px 20px;
}

.card{
background:white;
border-radius:20px;
padding:30px;
box-shadow:0 20px 50px rgba(0,0,0,0.08);
}

h1{
text-align:center;
font-size:42px;
margin-bottom:10px;
color:#3b7ea1;
}

.subtitle{
text-align:center;
color:#6b7b86;
font-size:18px;
margin-bottom:30px;
}

.qr{
display:block;
margin:auto;
width:220px;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.12);
margin-bottom:20px;
}

.question{
margin-top:20px;
padding:18px;
border-radius:14px;
background:#f7fbff;
border:1px solid #e3eef6;
}

.q-title{
font-weight:600;
font-size:18px;
margin-bottom:10px;
}

.option{
display:block;
padding:10px;
border-radius:8px;
cursor:pointer;
}

.option:hover{
background:#e9f4fb;
}

input{
margin-right:8px;
}

button{
margin-top:25px;
padding:14px 30px;
border:none;
border-radius:30px;
background:#4aa3d8;
color:white;
font-size:14px;
letter-spacing:1px;
cursor:pointer;
display:block;
margin-left:auto;
margin-right:auto;
}

button:hover{
background:#3a8ec1;
}

.result{
margin-top:25px;
text-align:center;
font-size:26px;
color:#3b7ea1;
font-weight:600;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>Закрепим знания</h1>

<p class="subtitle">
Отсканируйте QR код или пройдите тест
</p>

<img src="qr.png" class="qr">

<form id="quiz">

<div class="question">
<div class="q-title">1. Что такое работы на высоте?</div>

<label class="option"><input type="radio" name="q1" value="a">а) 1.3 м и менее 2 м до перепада</label>
<label class="option"><input type="radio" name="q1" value="b">б) 1.5 м</label>
<label class="option"><input type="radio" name="q1" value="c">в) 1.8 м</label>

</div>


<div class="question">
<div class="q-title">2. С какого возраста допускаются к работам?</div>

<label class="option"><input type="radio" name="q2" value="a">18 лет</label>
<label class="option"><input type="radio" name="q2" value="b">21 год</label>
<label class="option"><input type="radio" name="q2" value="c">16 лет</label>

</div>


<div class="question">
<div class="q-title">3. Какие СИЗ используются?</div>

<label class="option"><input type="radio" name="q3" value="a">Каски, жилеты, страховка</label>
<label class="option"><input type="radio" name="q3" value="b">Перчатки и очки</label>
<label class="option"><input type="radio" name="q3" value="c">Диэлектрические боты</label>

</div>


<div class="question">
<div class="q-title">4. Работы на приставных лестницах?</div>

<label class="option"><input type="radio" name="q4" value="a">Не разрешается</label>
<label class="option"><input type="radio" name="q4" value="b">С разрешения руководителя</label>
<label class="option"><input type="radio" name="q4" value="c">Не разрешается в любых случаях</label>

</div>


<div class="question">
<div class="q-title">5. Что обязательно оформить?</div>

<label class="option"><input type="radio" name="q5" value="a">Наряд-допуск</label>
<label class="option"><input type="radio" name="q5" value="b">Акт ППР</label>
<label class="option"><input type="radio" name="q5" value="c">Письменное задание</label>

</div>

<button type="button" onclick="checkQuiz()">Проверить результат</button>

</form>

<div id="result" class="result"></div>

</div>
</div>


<script>

function checkQuiz(){

let score=0

if(document.querySelector('input[name="q1"]:checked')?.value==="a") score++
if(document.querySelector('input[name="q2"]:checked')?.value==="a") score++
if(document.querySelector('input[name="q3"]:checked')?.value==="a") score++
if(document.querySelector('input[name="q4"]:checked')?.value==="c") score++
if(document.querySelector('input[name="q5"]:checked')?.value==="a") score++

document.getElementById("result").innerHTML=
"Ваш результат: "+score+" из 5 правильных ответов"

}

</script>

</body>
</html>
