<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Тест — Работы на высоте</title>

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:linear-gradient(180deg,#eef7ff,#ffffff);
color:#1e2b34;
}

.container{
max-width:950px;
margin:auto;
padding:50px 20px;
}

.card{
background:white;
border-radius:24px;
padding:40px;
box-shadow:0 30px 70px rgba(0,0,0,0.08);
position:relative;
overflow:hidden;
}

.card:before{
content:"";
position:absolute;
top:-120px;
left:-120px;
width:260px;
height:260px;
background:radial-gradient(circle,#cfeaff,transparent);
}

.card:after{
content:"";
position:absolute;
bottom:-120px;
right:-120px;
width:260px;
height:260px;
background:radial-gradient(circle,#d8efff,transparent);
}

h1{
text-align:center;
font-size:44px;
margin-bottom:5px;
color:#2f6f96;
}

.subtitle{
text-align:center;
color:#6a7d89;
font-size:18px;
margin-bottom:35px;
}

.qrBox{
text-align:center;
margin-bottom:30px;
}

.qr{
width:230px;
border-radius:16px;
padding:12px;
background:#eaf6ff;
box-shadow:0 12px 30px rgba(0,0,0,0.12);
}

.qrText{
margin-top:10px;
color:#6a7d89;
}

.question{
margin-top:20px;
padding:20px;
border-radius:14px;
background:#f5fbff;
border:1px solid #e0edf7;
transition:0.25s;
}

.question:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.q-title{
font-weight:600;
font-size:18px;
margin-bottom:10px;
}

.option{
display:block;
padding:10px;
border-radius:8px;
cursor:pointer;
transition:0.2s;
}

.option:hover{
background:#e6f3fb;
}

input{
margin-right:8px;
}

button{
margin-top:30px;
padding:16px 34px;
border:none;
border-radius:40px;
background:linear-gradient(90deg,#4aa3d8,#3f8ec0);
color:white;
font-size:15px;
letter-spacing:1px;
cursor:pointer;
display:block;
margin-left:auto;
margin-right:auto;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

button:hover{
transform:scale(1.03);
}

.result{
margin-top:30px;
text-align:center;
font-size:28px;
font-weight:600;
color:#2f6f96;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>Закрепим знания</h1>

<p class="subtitle">
Пройдите небольшой тест по теме работ на высоте
</p>

<div class="qrBox">
<img src="qr.png" class="qr">
<div class="qrText">Отсканируйте QR код</div>
</div>

<form id="quiz">

<div class="question">
<div class="q-title">1. Что такое работы на высоте?</div>

<label class="option"><input type="radio" name="q1" value="a">а) работа на высоте 1,3 м и менее 2 м до перепада</label>
<label class="option"><input type="radio" name="q1" value="b">б) работа на высоте 1,5 м</label>
<label class="option"><input type="radio" name="q1" value="c">в) работа на высоте 1,8 м</label>

</div>


<div class="question">
<div class="q-title">2. С какого возраста допускаются к работам на высоте?</div>

<label class="option"><input type="radio" name="q2" value="a">18 лет</label>
<label class="option"><input type="radio" name="q2" value="b">21 год</label>
<label class="option"><input type="radio" name="q2" value="c">16 лет</label>

</div>


<div class="question">
<div class="q-title">3. Какие СИЗ используются?</div>

<label class="option"><input type="radio" name="q3" value="a">Каски, жилеты, страховочные пояса</label>
<label class="option"><input type="radio" name="q3" value="b">Перчатки и очки</label>
<label class="option"><input type="radio" name="q3" value="c">Диэлектрические боты</label>

</div>


<div class="question">
<div class="q-title">4. Работы на приставных лестницах?</div>

<label class="option"><input type="radio" name="q4" value="a">Не разрешается</label>
<label class="option"><input type="radio" name="q4" value="b">С разрешения руководителя</label>
<label class="option"><input type="radio" name="q4" value="c">Не разрешается в любых случаях</label>

</div>


<div class="question">
<div class="q-title">5. Что обязательно оформить?</div>

<label class="option"><input type="radio" name="q5" value="a">Наряд-допуск</label>
<label class="option"><input type="radio" name="q5" value="b">Акт ППР</label>
<label class="option"><input type="radio" name="q5" value="c">Письменное задание</label>

</div>

<button type="button" onclick="checkQuiz()">Проверить результат</button>

</form>

<div id="result" class="result"></div>

</div>
</div>


<script>

function checkQuiz(){

let score=0

if(document.querySelector('input[name="q1"]:checked')?.value==="a") score++
if(document.querySelector('input[name="q2"]:checked')?.value==="a") score++
if(document.querySelector('input[name="q3"]:checked')?.value==="a") score++
if(document.querySelector('input[name="q4"]:checked')?.value==="c") score++
if(document.querySelector('input[name="q5"]:checked')?.value==="a") score++

document.getElementById("result").innerHTML=
"Ваш результат: "+score+" из 5 правильных ответов"

}

</script>

</body>
</html>
